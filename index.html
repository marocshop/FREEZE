<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/webp" href="logo.webp">
    
    <meta name="theme-color" content="#111827">

    <title>FREEZE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Announcement Bar -->
    <header class="announcement-bar">
        🔥 الصيف سخون... <strong>FREEZE عندها الحل.</strong>
    </header>

    <!-- Brand -->
    <section class="brand">

        <div class="divider"></div>

        <img
            src="assets/logo.webp"
            alt="FREEZE Logo"
            class="brand-logo">

        <div class="divider"></div>

    </section>

    <!-- Hero -->
    <section class="hero">

        <img
            src="assets/product.hero.webp"
            alt="FREEZE Air Cooler"
            class="hero-image">

        <a href="#order" class="cta-btn">
            ❄️ جيب البرودة دابا
        </a>

        <div class="trust-badges">

            <div class="badge">
                <span>🚚</span>
                <p>توصيل سريع</p>
            </div>

            <div class="badge">
                <span>💵</span>
                <p>الدفع عند الاستلام</p>
            </div>

            <div class="badge">
                <span>🔄</span>
                <p>استبدال في حالة وجود عيب</p>
            </div>

        </div>

    </section>

</body>
